<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>35地区 名簿管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a3a5c;
    --primary-light: #2563a8;
    --accent: #e8a020;
    --bg: #f4f6fa;
    --surface: #ffffff;
    --surface2: #eef1f7;
    --border: #d0d8e8;
    --text: #1a2535;
    --text-muted: #6b7a99;
    --success: #2e7d5e;
    --danger: #b94040;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(26,58,92,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--primary);
    color: #fff;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  header h1 {
    font-size: 0.95rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .fb-status {
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.1);
    padding: 3px 9px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .dot { width:7px;height:7px;border-radius:50%;background:#f87171;display:inline-block;flex-shrink:0; }
  .dot.ok { background:#4ade80; }

  /* ===== TABS ===== */
  .tab-bar {
    background: var(--primary);
    display: flex;
    padding: 0 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .tab-btn {
    padding: 10px 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    border-bottom: 3px solid transparent;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.85); }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: var(--accent);
  }

  /* ===== PAGE ===== */
  .page { display: none; }
  .page.active { display: block; }

  .main-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 14px 60px;
  }
  .main-wrap.wide { max-width: 1100px; }

  /* ===== CARD ===== */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.06em;
    border-bottom: 2px solid var(--surface2);
    padding-bottom: 10px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ===== FORM ===== */
  .form-group { margin-bottom: 18px; }
  .field-label {
    font-size: 0.77rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 7px;
  }
  .required { color: #e05252; margin-left: 3px; font-size: 0.7rem; }

  input[type="text"] {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 13px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.12);
    background: #fff;
  }

  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-btn { flex: 1; min-width: 60px; }
  .radio-btn input { display: none; }
  .radio-btn label {
    display: block;
    text-align: center;
    padding: 10px 6px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg);
    transition: all 0.15s;
  }
  .radio-btn input:checked + label {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .sub-field {
    display: none;
    margin-top: 10px;
    padding: 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }
  .sub-field.show { display: block; }
  .sub-label {
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 9px;
  }
  .sub-field .sub-field { border-left-color: var(--primary-light); }
  .sub-field .sub-field .sub-label { color: var(--primary-light); }

  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  .btn-submit {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit:hover { background: var(--primary-light); }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: #9bacc4; cursor: not-allowed; }

  /* ===== FILTER ===== */
  .filter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .filter-group > .flabel {
    font-size: 0.73rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    display: block;
    margin-bottom: 6px;
  }
  .check-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 0.76rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--bg);
    transition: all 0.15s;
    user-select: none;
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .filter-actions {
    display: flex;
    gap: 8px;
    margin-top: 13px;
    flex-wrap: wrap;
    align-items: center;
  }
  .count-info { font-size: 0.79rem; color: var(--text-muted); margin-left: auto; }

  .btn-sm {
    padding: 7px 13px;
    border-radius: 7px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-sm:hover { opacity: 0.82; }
  .btn-reset { background: var(--surface2); color: var(--text-muted); }
  .btn-pdf { background: #b94040; color: #fff; }
  .btn-excel { background: #2e7d5e; color: #fff; }

  /* ===== TABLE ===== */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
    min-width: 660px;
  }
  thead { background: var(--primary); color: #fff; }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 12px; vertical-align: middle; }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 0.73rem;
    font-weight: 700;
    white-space: nowrap;
    background: var(--surface2);
    color: var(--text-muted);
  }
  .badge.a { background: #dbeafe; color: #1d4ed8; }
  .badge.b { background: #dcfce7; color: #15803d; }
  .badge.c { background: #fef9c3; color: #a16207; }
  .badge.kaisou-y { background: #ede9fe; color: #7c3aed; }
  .badge.sat { background: #ffedd5; color: #c2410c; }
  .badge.sun { background: #fce7f3; color: #be185d; }
  .badge.t1 { background: #e0f2fe; color: #0369a1; }
  .badge.t2 { background: #ecfeff; color: #0e7490; }
  .badge.furikomi { background: #dbeafe; color: #1d4ed8; }
  .badge.genkin { background: #dcfce7; color: #15803d; }

  .btn-del {
    background: none;
    border: 1.5px solid #fca5a5;
    color: var(--danger);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-del:hover { background: #fee2e2; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 0.88rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

  .count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    border-radius: 12px;
    padding: 1px 8px;
    margin-left: 6px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #fff;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 0.86rem;
    font-weight: 600;
    z-index: 300;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.err { background: var(--danger); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .tab-btn { padding: 10px 14px; font-size: 0.8rem; }
    .main-wrap { padding: 14px 10px 60px; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 35地区 名簿管理</h1>
  <div class="fb-status">
    <span class="dot" id="fb-dot"></span>
    <span id="fb-label">接続中...</span>
  </div>
</header>

<!-- タブ -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('nyuryoku', this)">✏️ データ入力</button>
  <button class="tab-btn" onclick="switchTab('ichiran', this)">📋 名簿一覧</button>
</div>

<!-- ===== 入力タブ ===== -->
<div class="page active" id="page-nyuryoku">
  <div class="main-wrap">
    <div class="card">
      <div class="card-title">📝 新規登録</div>

      <div class="form-group">
        <label class="field-label">班名<span class="required">必須</span></label>
        <input type="text" id="f-han" placeholder="例：第1班">
      </div>

      <div class="form-group">
        <label class="field-label">氏名（フルネーム）<span class="required">必須</span></label>
        <input type="text" id="f-name" placeholder="例：山田 太郎">
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label class="field-label">コース<span class="required">必須</span></label>
        <div class="radio-group">
          <div class="radio-btn"><input type="radio" name="course" id="cA" value="A"><label for="cA">A</label></div>
          <div class="radio-btn"><input type="radio" name="course" id="cB" value="B"><label for="cB">B</label></div>
          <div class="radio-btn"><input type="radio" name="course" id="cC" value="C"><label for="cC">C</label></div>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label">御開扉<span class="required">必須</span></label>
        <div class="radio-group">
          <div class="radio-btn"><input type="radio" name="kaisou" id="kY" value="あり" onchange="onKaisouChange()"><label for="kY">あり</label></div>
          <div class="radio-btn"><input type="radio" name="kaisou" id="kN" value="なし" onchange="onKaisouChange()"><label for="kN">なし</label></div>
        </div>
        <div class="sub-field" id="sub-day">
          <div class="sub-label">▸ 参加日</div>
          <div class="radio-group">
            <div class="radio-btn"><input type="radio" name="day" id="dSat" value="土曜日" onchange="onDayChange()"><label for="dSat">土曜日</label></div>
            <div class="radio-btn"><input type="radio" name="day" id="dSun" value="日曜日" onchange="onDayChange()"><label for="dSun">日曜日</label></div>
          </div>
          <div class="sub-field" id="sub-time">
            <div class="sub-label">▸ 回次</div>
            <div class="radio-group">
              <div class="radio-btn"><input type="radio" name="time" id="t1" value="1回目"><label for="t1">1回目</label></div>
              <div class="radio-btn"><input type="radio" name="time" id="t2" value="2回目"><label for="t2">2回目</label></div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label">入金<span class="required">必須</span></label>
        <div class="radio-group">
          <div class="radio-btn"><input type="radio" name="payment" id="pT" value="振込"><label for="pT">振込</label></div>
          <div class="radio-btn"><input type="radio" name="payment" id="pC" value="現金"><label for="pC">現金</label></div>
        </div>
      </div>

      <button class="btn-submit" id="btn-add" onclick="addRecord()">＋ 登録する</button>
    </div>
  </div>
</div>

<!-- ===== 一覧タブ ===== -->
<div class="page" id="page-ichiran">
  <div class="main-wrap wide">

    <div class="card">
      <div class="card-title">🔍 絞り込み</div>
      <div class="filter-grid">
        <div class="filter-group">
          <span class="flabel">班名</span>
          <div class="check-list" id="filter-han"></div>
        </div>
        <div class="filter-group">
          <span class="flabel">コース</span>
          <div class="check-list">
            <span class="chip" data-filter="course" data-val="A" onclick="toggleChip(this)">A</span>
            <span class="chip" data-filter="course" data-val="B" onclick="toggleChip(this)">B</span>
            <span class="chip" data-filter="course" data-val="C" onclick="toggleChip(this)">C</span>
          </div>
        </div>
        <div class="filter-group">
          <span class="flabel">御開扉</span>
          <div class="check-list">
            <span class="chip" data-filter="kaisou" data-val="あり" onclick="toggleChip(this)">あり</span>
            <span class="chip" data-filter="kaisou" data-val="なし" onclick="toggleChip(this)">なし</span>
          </div>
        </div>
        <div class="filter-group">
          <span class="flabel">参加日</span>
          <div class="check-list">
            <span class="chip" data-filter="day" data-val="土曜日" onclick="toggleChip(this)">土曜日</span>
            <span class="chip" data-filter="day" data-val="日曜日" onclick="toggleChip(this)">日曜日</span>
          </div>
        </div>
        <div class="filter-group">
          <span class="flabel">回次</span>
          <div class="check-list">
            <span class="chip" data-filter="time" data-val="1回目" onclick="toggleChip(this)">1回目</span>
            <span class="chip" data-filter="time" data-val="2回目" onclick="toggleChip(this)">2回目</span>
          </div>
        </div>
        <div class="filter-group">
          <span class="flabel">入金</span>
          <div class="check-list">
            <span class="chip" data-filter="payment" data-val="振込" onclick="toggleChip(this)">振込</span>
            <span class="chip" data-filter="payment" data-val="現金" onclick="toggleChip(this)">現金</span>
          </div>
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-sm btn-reset" onclick="resetFilters()">リセット</button>
        <button class="btn-sm btn-pdf" onclick="exportPDF()">📄 PDF</button>
        <button class="btn-sm btn-excel" onclick="exportExcel()">📊 Excel</button>
        <span class="count-info" id="count-info"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        名簿一覧
        <span class="count-badge" id="list-count">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>班名</th>
              <th>氏名</th>
              <th>コース</th>
              <th>御開扉</th>
              <th>参加日</th>
              <th>回次</th>
              <th>入金</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="meibo-body">
            <tr><td colspan="9"><div class="empty-state"><div class="icon">⏳</div>読み込み中...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbcQCC5eaah5fssJd076qur4PtWkbbdNw",
  authDomain: "meibo35shiku.firebaseapp.com",
  projectId: "meibo35shiku",
  storageBucket: "meibo35shiku.firebasestorage.app",
  messagingSenderId: "928824384333",
  appId: "1:928824384333:web:b6fe8772e8384ad98d3504",
  databaseURL: "https://meibo35shiku-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById('fb-dot').classList.add('ok');
document.getElementById('fb-label').textContent = '接続済み';

// リアルタイム同期
window._records = [];
onValue(ref(db, 'meibo'), (snapshot) => {
  window._records = [];
  const data = snapshot.val();
  if (data) {
    Object.entries(data).forEach(([id, val]) => {
      window._records.push({ id, ...val });
    });
    window._records.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  }
  renderTable();
  updateHanFilter();
});

// 追加
window.addRecord = async function() {
  const han     = document.getElementById('f-han').value.trim();
  const name    = document.getElementById('f-name').value.trim();
  const course  = document.querySelector('input[name="course"]:checked')?.value || '';
  const kaisou  = document.querySelector('input[name="kaisou"]:checked')?.value || '';
  const day     = kaisou === 'あり' ? (document.querySelector('input[name="day"]:checked')?.value || '') : '';
  const time    = (kaisou === 'あり' && day === '日曜日') ? (document.querySelector('input[name="time"]:checked')?.value || '') : '';
  const payment = document.querySelector('input[name="payment"]:checked')?.value || '';

  if (!han)    { showToast('❌ 班名を入力してください', true); return; }
  if (!name)   { showToast('❌ 氏名を入力してください', true); return; }
  if (!course) { showToast('❌ コースを選択してください', true); return; }
  if (!kaisou) { showToast('❌ 御開扉を選択してください', true); return; }
  if (kaisou === 'あり' && !day)  { showToast('❌ 参加日を選択してください', true); return; }
  if (kaisou === 'あり' && day === '日曜日' && !time) { showToast('❌ 回次を選択してください', true); return; }
  if (!payment){ showToast('❌ 入金を選択してください', true); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    await push(ref(db, 'meibo'), { han, name, course, kaisou, day, time, payment, createdAt: Date.now() });
    showToast('✅ 登録しました！');
    document.getElementById('f-han').value = '';
    document.getElementById('f-name').value = '';
    document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    document.getElementById('sub-day').classList.remove('show');
    document.getElementById('sub-time').classList.remove('show');
  } catch(e) {
    showToast('❌ 保存エラー: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '＋ 登録する';
  }
};

// 削除
window.deleteRecord = async function(id) {
  if (!confirm('このレコードを削除しますか？')) return;
  try {
    await remove(ref(db, 'meibo/' + id));
    showToast('🗑️ 削除しました');
  } catch(e) {
    showToast('❌ 削除エラー: ' + e.message, true);
  }
};
</script>

<script>
// ===== タブ切り替え =====
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===== フォーム制御 =====
function onKaisouChange() {
  const val = document.querySelector('input[name="kaisou"]:checked')?.value;
  document.getElementById('sub-day').classList.toggle('show', val === 'あり');
  if (val !== 'あり') {
    document.querySelectorAll('input[name="day"], input[name="time"]').forEach(r => r.checked = false);
    document.getElementById('sub-time').classList.remove('show');
  }
}

function onDayChange() {
  const val = document.querySelector('input[name="day"]:checked')?.value;
  document.getElementById('sub-time').classList.toggle('show', val === '日曜日');
  if (val !== '日曜日') document.querySelectorAll('input[name="time"]').forEach(r => r.checked = false);
}

// ===== フィルター =====
function toggleChip(el) {
  el.classList.toggle('active');
  renderTable();
}

function resetFilters() {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  renderTable();
}

function getFilteredRecords() {
  const f = {};
  document.querySelectorAll('.chip.active').forEach(c => {
    const key = c.dataset.filter;
    if (!f[key]) f[key] = [];
    f[key].push(c.dataset.val);
  });
  return (window._records || []).filter(r => {
    for (const [key, vals] of Object.entries(f)) {
      if (!vals.includes(r[key] || '')) return false;
    }
    return true;
  });
}

function updateHanFilter() {
  const hans = [...new Set((window._records || []).map(r => r.han).filter(Boolean))].sort();
  const container = document.getElementById('filter-han');
  const active = [...container.querySelectorAll('.chip.active')].map(c => c.dataset.val);
  container.innerHTML = '';
  hans.forEach(h => {
    const el = document.createElement('span');
    el.className = 'chip' + (active.includes(h) ? ' active' : '');
    el.dataset.filter = 'han';
    el.dataset.val = h;
    el.textContent = h;
    el.onclick = function() { toggleChip(this); };
    container.appendChild(el);
  });
}

// ===== テーブル描画 =====
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTable() {
  const data = getFilteredRecords();
  const total = (window._records || []).length;
  document.getElementById('list-count').textContent = data.length;
  document.getElementById('count-info').textContent = `${data.length} 件表示 / 全 ${total} 件`;

  const tbody = document.getElementById('meibo-body');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">📭</div>データがありません</div></td></tr>';
    return;
  }

  tbody.innerHTML = data.map((r, i) => `
    <tr>
      <td style="color:var(--text-muted);font-size:0.73rem">${i + 1}</td>
      <td>${esc(r.han)}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td><span class="badge ${(r.course||'').toLowerCase()}">${esc(r.course)}</span></td>
      <td><span class="badge ${r.kaisou === 'あり' ? 'kaisou-y' : ''}">${esc(r.kaisou)}</span></td>
      <td>${r.day ? `<span class="badge ${r.day === '土曜日' ? 'sat' : 'sun'}">${esc(r.day)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${r.time ? `<span class="badge ${r.time === '1回目' ? 't1' : 't2'}">${esc(r.time)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${r.payment ? `<span class="badge ${r.payment === '振込' ? 'furikomi' : 'genkin'}">${esc(r.payment)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
      <td><button class="btn-del" onclick="deleteRecord('${r.id}')">削除</button></td>
    </tr>
  `).join('');
}

// ===== PDF出力 =====
function exportPDF() {
  const data = getFilteredRecords();
  const now = new Date().toLocaleDateString('ja-JP');
  const rows = data.map((r, i) => `
    <tr>
      <td>${i+1}</td><td>${r.han}</td><td>${r.name}</td><td>${r.course}</td>
      <td>${r.kaisou}</td><td>${r.day||'—'}</td><td>${r.time||'—'}</td><td>${r.payment||'—'}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
  <style>
    body{font-family:'Noto Sans JP',sans-serif;margin:20px;font-size:12px;}
    h2{color:#1a3a5c;margin-bottom:4px;}
    p{color:#666;font-size:10px;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;}
    th{background:#1a3a5c;color:#fff;padding:7px 8px;text-align:left;font-size:11px;}
    td{padding:6px 8px;border-bottom:1px solid #ddd;}
    tr:nth-child(even) td{background:#f4f6fa;}
  </style></head><body>
  <h2>📋 名簿一覧</h2>
  <p>出力日：${now} / ${data.length}件</p>
  <table><thead><tr><th>#</th><th>班名</th><th>氏名</th><th>コース</th><th>御開扉</th><th>参加日</th><th>回次</th><th>入金</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print();<\/script></body></html>`;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

// ===== Excel出力 =====
function exportExcel() {
  const data = getFilteredRecords();
  const wsData = [['#','班名','氏名','コース','御開扉','参加日','回次','入金']];
  data.forEach((r, i) => wsData.push([i+1, r.han, r.name, r.course, r.kaisou, r.day||'', r.time||'', r.payment||'']));
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:4},{wch:12},{wch:16},{wch:8},{wch:8},{wch:10},{wch:8},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '名簿');
  XLSX.writeFile(wb, `名簿_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ===== トースト =====
function showToast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' err' : '') + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}
